<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCfnihGycst9nqbJHYPhc3xC5MKU26LAJk",
    authDomain: "menuswift-fe577.firebaseapp.com",
    databaseURL: "https://menuswift-fe577-default-rtdb.firebaseio.com",
    projectId: "menuswift-fe577",
    storageBucket: "menuswift-fe577.appspot.com",
    messagingSenderId: "417323386413",
    appId: "1:417323386413:web:f50d9fc566ae5d8e77daa4"
  };
  
  firebase.initializeApp(firebaseConfig);
  
  const db = firebase.database();
  const auth = firebase.auth(); // <-- NAYA: Auth Initialize kiya
  
  const restaurantId = localStorage.getItem("restaurantId");
  let selectedItems = new Set();

  // --- NAYA: Login Check Code ---
  auth.onAuthStateChanged((user) => {
    if (user) {
      console.log("Admin successfully logged in:", user.email);
      // Data tabhi load hoga jab Admin ka login confirm ho jayega
      loadItems();
      loadGST();
    } else {
      console.warn("No Admin logged in!");
      alert("Aapka session expire ho gaya hai ya aap logged in nahi hain. Redirecting to Login...");
      // Niche "login.html" ki jagah apne admin login page ka sahi naam likhein
      window.location.href = "login.html"; 
    }
  });
  // -----------------------------

  function toggleModal(id) {
    document.getElementById(id).classList.toggle("hidden");
  }

  function uploadItem() {
    const name = document.getElementById("itemName").value.trim();
    const price = parseFloat(document.getElementById("itemPrice").value);
    const file = document.getElementById("itemImage").files[0];
    const vegType = document.getElementById("itemVegType").value;
    const hasPlateType = document.getElementById("hasPlateType").checked;
    const halfPlatePrice = hasPlateType ? parseFloat(document.getElementById("halfPlatePrice").value) : null;
    const fullPlatePrice = hasPlateType ? parseFloat(document.getElementById("fullPlatePrice").value) : null;

    if (!name || !file) {
      alert("Please fill all fields.");
      return;
    }
    
    if (hasPlateType && (!halfPlatePrice || !fullPlatePrice)) {
      alert("Please enter both half plate and full plate prices.");
      return;
    }
    
    if (!hasPlateType && !price) {
      alert("Please enter the price.");
      return;
    }

    const status = document.getElementById("uploadStatus");
    status.textContent = "Uploading...";
    status.classList.remove("hidden");

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "unsigned_preset");

    fetch("https://api.cloudinary.com/v1_1/dlko55uxs/image/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      const newItem = {
        name,
        price: hasPlateType ? fullPlatePrice : price,
        imageUrl: data.secure_url,
        imagePublicId: data.public_id,
        vegType,
        quantity: 10,
        active: true,
        hasPlateType,
        halfPlatePrice: hasPlateType ? halfPlatePrice : null,
        fullPlatePrice: hasPlateType ? fullPlatePrice : null,
        timestamp: Date.now(),
        restaurantId
      };
      return db.ref(`restaurants/${restaurantId}/menuItems`).push(newItem);
    })
    .then(() => {
      status.textContent = "✅ Item uploaded successfully!";
      setTimeout(() => {
        toggleModal('addModal');
        status.classList.add("hidden");
        resetAddForm();
        loadItems();
      }, 1500);
    })
    .catch(err => {
      console.error(err);
      status.textContent = "❌ Upload failed. Please try again.";
      setTimeout(() => status.classList.add("hidden"), 3000);
    });
  }

  function resetAddForm() {
    document.getElementById("itemName").value = "";
    document.getElementById("itemPrice").value = "";
    document.getElementById("itemImage").value = "";
    document.getElementById("hasPlateType").checked = false;
    document.getElementById("halfPlatePrice").value = "";
    document.getElementById("fullPlatePrice").value = "";
    document.getElementById("plateTypeSection").classList.add("hidden");
  }

  function loadItems() {
    db.ref(`restaurants/${restaurantId}/menuItems`).once("value", snapshot => {
      const container = document.getElementById("menuContainer");
      const search = document.getElementById("searchInput").value.toLowerCase();
      const filter = document.getElementById("filterOption").value;
      container.innerHTML = "";

      let items = [];
      snapshot.forEach(child => {
        const item = child.val();
        item.id = child.key;
        if (item.name.toLowerCase().includes(search)) {
          items.push(item);
        }
      });

      switch (filter) {
        case "newest":
          items.sort((a, b) => b.timestamp - a.timestamp);
          break;
        case "oldest":
          items.sort((a, b) => a.timestamp - b.timestamp);
          break;
        case "cheapest":
          items.sort((a, b) => a.price - b.price);
          break;
        case "costliest":
          items.sort((a, b) => b.price - a.price);
          break;
        case "veg":

        } else if (item.vegType === "Non-Veg") {

          vegColor = "text-red-600 bg-red-50";
        } else if (item.vegType === "Drinks") {
          vegIcon = "🥤";
          vegColor = "text-blue-600 bg-blue-50";
        }
        
        const priceDisplay = item.hasPlateType ? 
          `<div class="text-xs sm:text-sm text-slate-600">Half: ₹${item.halfPlatePrice}<br class="sm:hidden"><span class="hidden sm:inline"> | </span>Full: ₹${item.fullPlatePrice}</div>` :
          `<span class="text-lg sm:text-2xl font-bold text-primary-600">₹${item.price}</span>`;
        
        div.innerHTML = `
          <div class="relative">
            <img src="${item.imageUrl}" class="w-full h-32 sm:h-48 object-cover group-hover:scale-105 transition-transform duration-300" alt="${item.name}" />
            <div class="absolute top-2 left-2 flex items-center space-x-2">
              <input type="checkbox" class="item-checkbox w-3 h-3 sm:w-4 sm:h-4 text-primary-600 bg-white border-slate-300 rounded focus:ring-primary-500 focus:ring-2" data-item-id="${item.id}" onchange="updateBulkButtons()">
            </div>
            <div class="absolute top-2 right-2">
              <div class="toggle-switch">
                <input type="checkbox" id="toggle-${item.id}" ${item.active ? "checked" : ""} onchange="toggleStatus('${item.id}', this.checked)" class="toggle-input">
                <label for="toggle-${item.id}" class="toggle-label"></label>
              </div>
            </div>
          </div>
          
          <div class="p-3 sm:p-6">
            <div class="mb-3">
              <span class="inline-flex items-center px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-full text-xs font-medium ${vegColor}">
                ${vegIcon} ${item.vegType}
              </span>
            </div>
            
            <h3 class="text-sm sm:text-lg font-bold text-slate-900 mb-2 line-clamp-2">${item.name}</h3>
            
            <div class="flex items-center justify-between mb-4">
              ${priceDisplay}
              <span class="text-xs sm:text-sm text-slate-500">${item.hasPlateType ? 'Multiple' : 'Single'}</span>
            </div>
            
            <div class="flex gap-1 sm:gap-2">
              <button onclick="editItem('${item.id}')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-1.5 px-2 sm:py-2 sm:px-4 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium transition-colors flex items-center justify-center space-x-1 sm:space-x-2">
                <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                <span class="hidden sm:inline">Edit</span>
              </button>
              <button onclick="deleteItem('${item.id}')" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-1.5 px-2 sm:py-2 sm:px-4 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium transition-colors flex items-center justify-center space-x-1 sm:space-x-2">
                <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                <span class="hidden sm:inline">Delete</span>
              </button>

        container.appendChild(div);
      });
    });
  }

  function toggleStatus(itemId, status) {
    db.ref(`restaurants/${restaurantId}/menuItems/${itemId}/active`).set(status);
  }

  // ===== UPDATED: Delete item completely including image and offer references =====
  // ===== UPDATED: Delete item completely including image and offer references =====
  function deleteItem(itemId) {
    if (confirm("Are you sure you want to delete this item? This action cannot be undone.")) {
      
      db.ref(`restaurants/${restaurantId}/menuItems/${itemId}`).once("value").then(async snapshot => {
        const item = snapshot.val();
        const updates = {};
        
        // 1. DELETE IMAGE FROM CLOUDINARY VIA BACKEND
        if (item.imagePublicId) {
            try {
                // IMPORTANT: Replace with your actual backend URL (e.g., https://your-api.com/delete-image)
                await fetch('https://menu-swift.vercel.app/delete-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ public_id: item.imagePublicId })
                });
                console.log("Image deleted from Cloudinary");
            } catch (err) {
                console.error("Failed to delete image from Cloudinary:", err);
            }
        }
        
        // 2. Remove the menu item from Firebase
        updates[`restaurants/${restaurantId}/menuItems/${itemId}`] = null;
        
        // Remove any offer references for this item
        return db.ref(`restaurants/${restaurantId}/offers`).once("value").then(offersSnap => {
          if (offersSnap.exists()) {
            offersSnap.forEach(offerChild => {
              const offer = offerChild.val();
              if (offer.itemId === itemId) {
                updates[`restaurants/${restaurantId}/offers/${offerChild.key}`] = null;
              }
            });
          }
          
          // Remove any trending references for this item
          return db.ref(`restaurants/${restaurantId}/trending`).once("value").then(trendSnap => {
            if (trendSnap.exists()) {
              trendSnap.forEach(trendChild => {
                const trend = trendChild.val();
                if (trend.itemId === itemId) {
                  updates[`restaurants/${restaurantId}/trending/${trendChild.key}`] = null;
                }
              });
            }
            
            // Apply all deletions at once
            return db.ref().update(updates);
          });
        });
      }).then(() => {
        loadItems();
        alert("✅ Item and Image deleted successfully!");
      }).catch(err => {
        console.error("Delete error:", err);
        alert("❌ Failed to delete item. Please try again.");
      });
    }
  }

  function editItem(id) {
    db.ref(`restaurants/${restaurantId}/menuItems/${id}`).once("value").then(snapshot => {
      const item = snapshot.val();
      document.getElementById("editName").value = item.name;
      document.getElementById("editPrice").value = item.price;
      document.getElementById("editVegType").value = item.vegType;
      document.getElementById("editHasPlateType").checked = item.hasPlateType || false;
      
      if (item.hasPlateType) {
        document.getElementById("editHalfPlatePrice").value = item.halfPlatePrice || "";
        document.getElementById("editFullPlatePrice").value = item.fullPlatePrice || "";
        document.getElementById("editPlateTypeSection").classList.remove("hidden");
      } else {
        document.getElementById("editPlateTypeSection").classList.add("hidden");
      }
      
      document.getElementById("editItemId").value = id;
      toggleModal('editModal');
    });
  }

  function saveEdit() {
    const id = document.getElementById("editItemId").value;
    const name = document.getElementById("editName").value.trim();
    const price = parseFloat(document.getElementById("editPrice").value);
    const vegType = document.getElementById("editVegType").value;
    const hasPlateType = document.getElementById("editHasPlateType").checked;
    const halfPlatePrice = hasPlateType ? parseFloat(document.getElementById("editHalfPlatePrice").value) : null;
    const fullPlatePrice = hasPlateType ? parseFloat(document.getElementById("editFullPlatePrice").value) : null;
    const newFile = document.getElementById("editImage").files[0];
    const status = document.getElementById("editStatus");

    if (!name) {
      alert("Please enter a valid name.");
      return;
    }
    
    if (hasPlateType && (!halfPlatePrice || !fullPlatePrice)) {
      alert("Please enter both half plate and full plate prices.");
      return;
    }
    
    if (!hasPlateType && !price) {
      alert("Please enter the price.");
      return;
    }

    status.textContent = "Saving changes...";
    status.classList.remove("hidden");

    const updateData = { 
      name, 
      price: hasPlateType ? fullPlatePrice : price, 
      vegType, 
      hasPlateType,
      halfPlatePrice: hasPlateType ? halfPlatePrice : null,
      fullPlatePrice: hasPlateType ? fullPlatePrice : null
    };

    const update = () => {
      db.ref(`restaurants/${restaurantId}/menuItems/${id}`).update(updateData).then(() => {
        status.textContent = "✅ Changes saved successfully!";
        setTimeout(() => {
          toggleModal('editModal');
          status.classList.add("hidden");
          document.getElementById("editImage").value = "";
          document.getElementById("editPlateTypeSection").classList.add("hidden");
          loadItems();
        }, 1500);
      });
    };

    if (newFile) {
      const formData = new FormData();
      formData.append("file", newFile);
      formData.append("upload_preset", "unsigned_preset");

      fetch("https://api.cloudinary.com/v1_1/dlko55uxs/image/upload", {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        updateData.imageUrl = data.secure_url;
        updateData.imagePublicId = data.public_id;
        update();
      })
      .catch(err => {
        status.textContent = "❌ Image upload failed. Please try again.";
        console.error(err);
        setTimeout(() => status.classList.add("hidden"), 3000);
      });
    } else {
      update();
    }
  }

  // Plate type functionality
  document.getElementById("hasPlateType").addEventListener("change", function() {
    const section = document.getElementById("plateTypeSection");
    if (this.checked) {
      section.classList.remove("hidden");
    } else {
      section.classList.add("hidden");
      document.getElementById("halfPlatePrice").value = "";
      document.getElementById("fullPlatePrice").value = "";
    }
  });

  document.getElementById("editHasPlateType").addEventListener("change", function() {
    const section = document.getElementById("editPlateTypeSection");
    if (this.checked) {
      section.classList.remove("hidden");
    } else {
      section.classList.add("hidden");
      document.getElementById("editHalfPlatePrice").value = "";
      document.getElementById("editFullPlatePrice").value = "";
    }
  });

  function autoAdjustHalfPrice() {
    const fullPrice = parseFloat(document.getElementById("itemPrice").value) || parseFloat(document.getElementById("fullPlatePrice").value);
    if (fullPrice) {
      document.getElementById("halfPlatePrice").value = (fullPrice * 0.5).toFixed(2);
      document.getElementById("fullPlatePrice").value = fullPrice.toFixed(2);
    }
  }

  function autoAdjustEditHalfPrice() {
    const fullPrice = parseFloat(document.getElementById("editPrice").value) || parseFloat(document.getElementById("editFullPlatePrice").value);
    if (fullPrice) {
      document.getElementById("editHalfPlatePrice").value = (fullPrice * 0.5).toFixed(2);
      document.getElementById("editFullPlatePrice").value = fullPrice.toFixed(2);
    }
  }

  // Bulk operations
  function toggleSelectAll() {
    const selectAll = document.getElementById("selectAll");
    const checkboxes = document.querySelectorAll(".item-checkbox");
    
    checkboxes.forEach(checkbox => {
      checkbox.checked = selectAll.checked;
      if (selectAll.checked) {
        selectedItems.add(checkbox.dataset.itemId);
      } else {
        selectedItems.delete(checkbox.dataset.itemId);
      }
    });
    
    updateBulkButtons();
  }

  function updateBulkButtons() {
    const checkboxes = document.querySelectorAll(".item-checkbox:checked");
    const bulkEditBtn = document.getElementById("bulkEditBtn");
    const bulkDeleteBtn = document.getElementById("bulkDeleteBtn");
    
    selectedItems.clear();
    checkboxes.forEach(checkbox => {
      selectedItems.add(checkbox.dataset.itemId);
    });
    
    const hasSelection = selectedItems.size > 0;
    bulkEditBtn.disabled = !hasSelection;
    bulkDeleteBtn.disabled = !hasSelection;
    
    // Update select all checkbox
    const allCheckboxes = document.querySelectorAll(".item-checkbox");
    const selectAllCheckbox = document.getElementById("selectAll");
    selectAllCheckbox.indeterminate = selectedItems.size > 0 && selectedItems.size < allCheckboxes.length;
    selectAllCheckbox.checked = selectedItems.size === allCheckboxes.length && allCheckboxes.length > 0;
  }

  function bulkEdit() {
    if (selectedItems.size === 0) return;
    toggleModal('bulkEditModal');
  }

  // ===== UPDATED: Bulk delete with full cleanup =====
 // ===== UPDATED: Bulk delete with full cleanup & image deletion =====
  async function bulkDelete() {
    if (selectedItems.size === 0) return;
    
    if (confirm(`Are you sure you want to delete ${selectedItems.size} selected items? This action cannot be undone.`)) {
      const itemIds = Array.from(selectedItems);
      const updates = {};
      
      try {
        // 1. Fetch data for all selected items to get their imagePublicIds
        for (const itemId of itemIds) {
          const snapshot = await db.ref(`restaurants/${restaurantId}/menuItems/${itemId}`).once("value");
          const item = snapshot.val();
          
          // Delete image from Cloudinary if public_id exists
          if (item && item.imagePublicId) {
              try {
                  await fetch('https://menu-swift.vercel.app/delete-image', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ public_id: item.imagePublicId })
                  });
              } catch (err) {
                  console.error("Failed to delete bulk image from Cloudinary:", err);
              }
          }
          
          // Mark for Firebase deletion
          updates[`restaurants/${restaurantId}/menuItems/${itemId}`] = null;
        }
        
        // 2. Clean up any offer/trending references
        const [offersSnap, trendSnap] = await Promise.all([
          db.ref(`restaurants/${restaurantId}/offers`).once("value"),
          db.ref(`restaurants/${restaurantId}/trending`).once("value")
        ]);

        if (offersSnap.exists()) {
          offersSnap.forEach(child => {
            if (itemIds.includes(child.val().itemId)) {
              updates[`restaurants/${restaurantId}/offers/${child.key}`] = null;
            }
          });
        }
        if (trendSnap.exists()) {
          trendSnap.forEach(child => {
            if (itemIds.includes(child.val().itemId)) {
              updates[`restaurants/${restaurantId}/trending/${child.key}`] = null;
            }
          });
        }
        
        // 3. Apply Firebase deletions
        await db.ref().update(updates);
        
        selectedItems.clear();
        loadItems();
        alert(`✅ ${itemIds.length} items and their images deleted successfully!`);
        
      } catch (err) {
        console.error(err);
        alert("❌ Delete failed. Please try again.");
      }
    }
  }

  function saveBulkEdit() {
    const vegType = document.getElementById("bulkVegType").value;
    const status = document.getElementById("bulkStatus").value;
    const statusElement = document.getElementById("bulkEditStatus");
    
    if (!vegType && !status) {
      alert("Please select at least one field to update.");
      return;
    }
    
    statusElement.textContent = "Updating items...";
    statusElement.classList.remove("hidden");
    
    const updates = {};
    Array.from(selectedItems).forEach(itemId => {
      if (vegType) updates[`restaurants/${restaurantId}/menuItems/${itemId}/vegType`] = vegType;
      if (status) updates[`restaurants/${restaurantId}/menuItems/${itemId}/active`] = status === "true";
    });
    
    db.ref().update(updates).then(() => {
      statusElement.textContent = `✅ ${selectedItems.size} items updated successfully!`;
      setTimeout(() => {
        toggleModal('bulkEditModal');
        statusElement.classList.add("hidden");
        document.getElementById("bulkVegType").value = "";
        document.getElementById("bulkStatus").value = "";
        selectedItems.clear();
        loadItems();
      }, 1500);
    }).catch(err => {
      console.error(err);
      statusElement.textContent = "❌ Update failed. Please try again.";
      setTimeout(() => statusElement.classList.add("hidden"), 3000);
    });
  }

  function openOffersPage(){
    window.location.href = "offers.html";
  }

  function openGSTPopup() {
    document.getElementById("gstPopup").style.display = "flex";
    db.ref(`restaurants/${restaurantId}/settings/gstPercent`)
      .once("value", snap => {
        document.getElementById("gstInput").value = snap.val() || 0;
      });
  }

  function closeGSTPopup() {
    document.getElementById("gstPopup").style.display = "none";
  }

  function saveGST() {
    const gst = Number(document.getElementById("gstInput").value || 0);
    db.ref(`restaurants/${restaurantId}/settings`).update({
      gstPercent: gst
    });
    closeGSTPopup();
  }

  function loadGST() {
    db.ref(`restaurants/${restaurantId}/settings/gstPercent`)
      .once("value", snap => {
        const value = snap.val() || 0;
        if (document.getElementById("gstInput")) {
          document.getElementById("gstInput").value = value;
        }
      });
  }

 
</script>

    border-radius: 50%;
    transition: all 0.3s ease;

  }

      transform: translateX(24px);
